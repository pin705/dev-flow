services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      sh -lc "pnpm install --frozen-lockfile &&
      pnpm db:migrate &&
      pnpm db:seed &&
      pnpm dev:web"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SENTRY_DISABLED: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_URL: postgres://devflow:devflow@postgres:5432/devflow
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
      - root-node-modules:/workspace/node_modules
      - web-node-modules:/workspace/apps/web/node_modules

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devflow
      POSTGRES_USER: devflow
      POSTGRES_PASSWORD: devflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow -d devflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  pnpm-store:
  root-node-modules:
  web-node-modules:
  postgres-data:
